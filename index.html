<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d7263d" />
  <title>Glizzy Button</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>glizzy button</h1>
    <p class="tagline">portable glizzy altar • now browser-safe</p>

    <div class="image-wrap">
      <img id="hotdogImage" src="assets/hotdog_1.png" alt="random hot dog" />
    </div>

    <button id="glizzyButton" type="button">GLIZZY</button>
    <p id="caption" class="caption">tap the button. face the sausage.</p>

    <audio id="glizzyAudio" preload="auto" src="assets/glizzy.mp3"></audio>
  </main>

  <script src="app.js"></script>
</body>
</html>
